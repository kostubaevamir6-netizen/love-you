.buttons{
    position:relative;
    width:100%;
    height:200px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    right:5%;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    transition:0.2s;
}

    background:#fd0190;

}

    background:#ff00d0;
    color:white;
    position:absolute;
    left:55%;
}

#page2{
    display:none;
    background:linear-gradient(135deg,#ffe6f0,#ffd6e7);
}

#page2 h1{
    font-size:60px;
}

    font-size:28px;
    color:#444;
}

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

// Кнопка НЕТ убегает от мышки
document.addEventListener("mousemove", function(e){

    const rect = noBtn.getBoundingClientRect();

    const btnX = rect.left + rect.width / 2;
    const btnY = rect.top + rect.height / 2;

    const distanceX = e.clientX - btnX;
    const distanceY = e.clientY - btnY;

    const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

    if(distance < 100){

        let newX = noBtn.offsetLeft - distanceX * 4;
        let newY = noBtn.offsetTop - distanceY * 4;

        // границы сайта
        newX = Math.max(0, Math.min(window.innerWidth - noBtn.offsetWidth, newX));
        newY = Math.max(0, Math.min(window.innerHeight - noBtn.offsetHeight, newY));

        noBtn.style.left = newX + "px";
        noBtn.style.top = newY + "px";
    }
});

yesBtn.addEventListener("click", function(){
    page1.style.display = "none";
    page2.style.display = "flex";
});

</script>
